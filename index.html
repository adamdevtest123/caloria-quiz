<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ffffff" />
<title>Is Caloria right for you?</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="app">
  <header class="flex items-center gap-3 mb-6" id="topBar">
    <button id="backBtn" class="icon-btn" aria-label="Back">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="text-xs font-bold text-gray-400 tabular-nums" id="progressText">0/8</div>
  </header>
  <main id="main" class="flex-1 flex flex-col"></main>
  <footer class="text-center text-xs text-gray-400 pt-4">
    <span class="font-semibold">Caloria</span> · scan your food, see the calories
  </footer>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
